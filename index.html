<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TERMOX</title>

  <!-- Importa a fonte Inter do Google Fonts (visual moderno) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Liga o arquivo de estilo -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- CABEÇALHO: logo e subtítulo. Aqui é onde você troca o nome KONSIGO depois -->
    <header class="header">
<h1 class="logo">TERMOX</h1>
<p class="subtitulo">Acerte ou seja desafiado</p>
    </header>

    <!-- GRADE: 6 linhas, cada uma com 5 quadradinhos (tiles).
         Os atributos data-linha e data-pos vão ajudar o JavaScript a achar cada tile depois. -->
    <main class="grade" id="grade">
      <div class="linha" data-linha="0">
        <div class="tile" data-pos="0"></div>
        <div class="tile" data-pos="1"></div>
        <div class="tile" data-pos="2"></div>
        <div class="tile" data-pos="3"></div>
        <div class="tile" data-pos="4"></div>
      </div>
      <div class="linha" data-linha="1">
        <div class="tile" data-pos="0"></div>
        <div class="tile" data-pos="1"></div>
        <div class="tile" data-pos="2"></div>
        <div class="tile" data-pos="3"></div>
        <div class="tile" data-pos="4"></div>
      </div>
      <div class="linha" data-linha="2">
        <div class="tile" data-pos="0"></div>
        <div class="tile" data-pos="1"></div>
        <div class="tile" data-pos="2"></div>
        <div class="tile" data-pos="3"></div>
        <div class="tile" data-pos="4"></div>
      </div>
      <div class="linha" data-linha="3">
        <div class="tile" data-pos="0"></div>
        <div class="tile" data-pos="1"></div>
        <div class="tile" data-pos="2"></div>
        <div class="tile" data-pos="3"></div>
        <div class="tile" data-pos="4"></div>
      </div>
      <div class="linha" data-linha="4">
        <div class="tile" data-pos="0"></div>
        <div class="tile" data-pos="1"></div>
        <div class="tile" data-pos="2"></div>
        <div class="tile" data-pos="3"></div>
        <div class="tile" data-pos="4"></div>
      </div>
      <div class="linha" data-linha="5">
        <div class="tile" data-pos="0"></div>
        <div class="tile" data-pos="1"></div>
        <div class="tile" data-pos="2"></div>
        <div class="tile" data-pos="3"></div>
        <div class="tile" data-pos="4"></div>
      </div>
    </main>

    <!-- ÁREA DE MENSAGEM: aqui vai aparecer "Vitória!", "Palavra incompleta", etc. -->
    <div class="mensagem" id="mensagem"></div>

    <!-- TECLADO VIRTUAL: 3 fileiras. ENTER e ⌫ têm a classe "tecla-larga" pra ficarem maiores -->
    <div class="teclado" id="teclado">
      <div class="fileira">
        <button class="tecla" data-tecla="Q">Q</button>
        <button class="tecla" data-tecla="W">W</button>
        <button class="tecla" data-tecla="E">E</button>
        <button class="tecla" data-tecla="R">R</button>
        <button class="tecla" data-tecla="T">T</button>
        <button class="tecla" data-tecla="Y">Y</button>
        <button class="tecla" data-tecla="U">U</button>
        <button class="tecla" data-tecla="I">I</button>
        <button class="tecla" data-tecla="O">O</button>
        <button class="tecla" data-tecla="P">P</button>
      </div>
      <div class="fileira">
        <button class="tecla" data-tecla="A">A</button>
        <button class="tecla" data-tecla="S">S</button>
        <button class="tecla" data-tecla="D">D</button>
        <button class="tecla" data-tecla="F">F</button>
        <button class="tecla" data-tecla="G">G</button>
        <button class="tecla" data-tecla="H">H</button>
        <button class="tecla" data-tecla="J">J</button>
        <button class="tecla" data-tecla="K">K</button>
        <button class="tecla" data-tecla="L">L</button>
      </div>
      <div class="fileira">
        <button class="tecla tecla-larga" data-tecla="ENTER">ENTER</button>
        <button class="tecla" data-tecla="Z">Z</button>
        <button class="tecla" data-tecla="X">X</button>
        <button class="tecla" data-tecla="C">C</button>
        <button class="tecla" data-tecla="V">V</button>
        <button class="tecla" data-tecla="B">B</button>
        <button class="tecla" data-tecla="N">N</button>
        <button class="tecla" data-tecla="M">M</button>
        <button class="tecla tecla-larga" data-tecla="BACKSPACE">⌫</button>
      </div>
    </div>

  </div>

  <!-- Liga o arquivo de lógica (ainda vazio nesta etapa) -->
  <script src="script.js"></script>
</body>
</html>
